repos:
- repo: local
  hooks:
  - id: ruff
    name: ruff-check
    entry: uv run ruff check --fix --no-cache --force-exclude --unsafe-fixes
    language: system
    types: [ python ]

  - id: ruff-format
    name: ruff-format
    entry: uv run ruff format --no-cache --force-exclude
    language: system
    types: [ python ]

  - id: basedpyright
    name: basedpyright-check
    entry: uv run basedpyright
    language: system
    types: [ python ]
    require_serial: true
